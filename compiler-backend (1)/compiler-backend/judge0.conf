# Judge0 configuration
# Full config reference: https://github.com/judge0/judge0/blob/master/judge0.conf

REDIS_HOST=judge0-redis
REDIS_PORT=6379

POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0pass

# Execution limits
CPU_TIME_LIMIT=5
CPU_EXTRA_TIME=1
WALL_TIME_LIMIT=10
MEMORY_LIMIT=65536
STACK_LIMIT=65536
MAX_PROCESSES_AND_OR_THREADS=60
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false
MAX_FILE_SIZE=4096
NUMBER_OF_RUNS=1

# Security
ENABLE_NETWORK=false          # no outbound network from user code
ALLOWED_EXTENSIONS_FOR_UPLOAD=
