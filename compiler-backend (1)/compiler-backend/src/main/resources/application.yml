server:
  port: 8085

spring:
  application:
    name: codecraft-compiler

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 5000ms

  jackson:
    default-property-inclusion: non_null

judge0:
  base-url: ${JUDGE0_URL:http://localhost:2358}
  poll-timeout: 60000
  poll-interval: 500

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash-lite

rate-limit:
  runs-per-minute: 10
  ai-per-minute: 5

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
    - http://localhost:3001
    - https://yourdomain.com

logging:
  level:
    com.codecraft: DEBUG
    root: INFO